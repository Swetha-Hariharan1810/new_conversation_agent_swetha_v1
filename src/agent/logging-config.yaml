# logging-config.yaml
# Clean config for CLI / LangGraph agent.
# No ASGI dependencies — works without asgi-correlation-id.

version: 1
disable_existing_loggers: true

formatters:
  json:
    "()": pythonjsonlogger.json.JsonFormatter
    format: "%(asctime)s %(levelname)s %(name)s %(message)s %(funcName)s %(lineno)d"

  simple:
    format: "%(asctime)s [%(levelname)s] %(name)s — %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: simple

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/app.log
    maxBytes: 10485760   # 10 MB
    backupCount: 5
    encoding: utf-8

loggers:
  agent:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  langgraph:
    level: WARNING
    handlers: [console]
    propagate: false

  langchain:
    level: WARNING
    handlers: [console]
    propagate: false

  httpcore:
    level: WARNING
    handlers: []
    propagate: false

  httpx:
    level: WARNING
    handlers: []
    propagate: false

  openai:
    level: WARNING
    handlers: []
    propagate: false

root:
  level: INFO
  handlers: [console]
