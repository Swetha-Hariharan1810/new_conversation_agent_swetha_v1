# yamllint disable rule:line-length
# yamllint disable rule:truthy
---
name: Conversation Evaluation Bench

on:
  pull_request:
    branches:
      - develop
      - main
      - stage
      - test

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bench:
    name: Conversation Evaluation (PCP scenarios)
    runs-on: ubuntu-latest

    env:
      ITERATIONS: "1"
      RESULTS_DIR: "scripts/conversational_workload/results"
      REPORT_FILE: "conversation_eval_report.json"
      SCORE_THRESHOLD: "0.7"

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Clean Python cache
        run: |
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true

      - name: UV setup and activate
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          activate-environment: true

      - name: Install dependencies
        run: uv sync

      - name: Run conversation evaluation
        env:
          PYTHONPATH: ${{ github.workspace }}
          PYTHONDONTWRITEBYTECODE: "1"
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          OPENAI_API_VERSION: ${{ secrets.OPENAI_API_VERSION }}
          WORKER_DEPLOYMENT: ${{ secrets.WORKER_DEPLOYMENT }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_CLIENT_SECRET: ${{ secrets.SF_CLIENT_SECRET }}
          SF_REFRESH_TOKEN: ${{ secrets.SF_REFRESH_TOKEN }}
          SF_TOKEN_URL: ${{ secrets.SF_TOKEN_URL }}
          SF_API_VERSION: ${{ secrets.SF_API_VERSION }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
          LANGSMITH_TRACING: "false"
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: new_conversation_agent_swetha_v1
        run: |
          mkdir -p "$RESULTS_DIR"
          python scripts/conversational_workload/run_eval.py

      - name: Validate scores
        run: |
          python - <<'EOF'
          import json, os, sys

          threshold = float(os.getenv("SCORE_THRESHOLD", "0.7"))
          results_dir = os.getenv("RESULTS_DIR", "scripts/conversational_workload/results")
          report_file = os.getenv("REPORT_FILE", "conversation_eval_report.json")
          path = os.path.join(results_dir, report_file)

          with open(path) as f:
              summary = json.load(f)

          failures = [
              (scenario, data.get("average_final_score", 0))
              for scenario, data in summary.items()
              if data.get("average_final_score", 0) < threshold
          ]

          if failures:
              print(f"FAILED scenarios (threshold={threshold}):")
              for scenario, score in failures:
                  print(f"  {scenario}: {score:.2f}")
              sys.exit(1)

          print(f"All {len(summary)} scenarios passed (threshold={threshold})")
          EOF

      - name: Comment per-scenario scores on PR
        if: always()
        uses: actions/github-script@v7
        env:
          RESULTS_DIR: ${{ env.RESULTS_DIR }}
          REPORT_FILE: ${{ env.REPORT_FILE }}
          SCORE_THRESHOLD: ${{ env.SCORE_THRESHOLD }}
        with:
          script: |
            const fs = require('fs');
            const path = `${process.env.RESULTS_DIR}/${process.env.REPORT_FILE}`;
            const threshold = parseFloat(process.env.SCORE_THRESHOLD || '0.7');

            let summary = {};
            try { summary = JSON.parse(fs.readFileSync(path, 'utf8')); } catch (e) {}

            const rows = Object.entries(summary).map(([scenario, data]) => {
              const score = (data.average_final_score || 0).toFixed(2);
              const pass = (data.average_final_score || 0) >= threshold ? '✅' : '❌';
              return `| ${scenario} | ${score} | ${pass} |`;
            }).join('\n');

            const body =
              `### Conversation Evaluation Bench (PCP scenarios)\n\n` +
              `Threshold: **${threshold}** | Runs per scenario: ${process.env.ITERATIONS || 1}\n\n` +
              `| Scenario | Avg Score | Pass |\n|---|---:|---:|\n` +
              rows;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: conversation-eval-results
          path: scripts/conversational_workload/results/
          if-no-files-found: ignore
